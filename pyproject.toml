[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "alden"
version = "0.1.0"
description = "A small reusable Python library"
readme = "README.md"
requires-python = ">=3.10"
authors = [
  {name = "Alois Denervaud", email = ""}
]
dependencies = []

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]